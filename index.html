<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parquímetro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="container">

    <header class="card-header">
      <span class="icon">🅿️</span>
      <h1>Parquímetro</h1>
      <p>Insira o valor pago e veja quanto tempo você tem.</p>
    </header>

    <section class="card-body">

      <div class="tabela">
        <p class="tabela-titulo">Tabela de valores</p>
        <div class="tabela-grid">
          <div class="tabela-item">
            <span class="tabela-valor">R$ 1,00</span>
            <span class="tabela-tempo">30 min</span>
          </div>
          <div class="tabela-item">
            <span class="tabela-valor">R$ 1,75</span>
            <span class="tabela-tempo">60 min</span>
          </div>
          <div class="tabela-item tabela-item--destaque">
            <span class="tabela-valor">R$ 3,00</span>
            <span class="tabela-tempo">120 min <span class="badge">máx</span></span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="valorInput">Valor inserido (R$)</label>
        <div class="input-wrap">
          <span class="input-prefix">R$</span>
          <input
            type="number"
            id="valorInput"
            placeholder="0,00"
            min="0"
            step="0.25"
            autocomplete="off"
          />
        </div>
        <button id="btnCalcular" onclick="calcular()">Calcular</button>
      </div>

      <div class="resultado" id="resultado" style="display:none;"></div>

    </section>

  </main>

  <script src="scripts.js"></script>

</body>
</html>
